<style>
  :root {
    --bg: #f4f1e8;
    --bg-accent: #ead7bd;
    --card: #fffaf0;
    --ink: #1f1b18;
    --muted: #5e5145;
    --line: #d7c3a8;
    --action: #1f7a5a;
    --action-ink: #f5fff9;
    --danger: #a03131;
    --ok: #1f7a5a;
    --pending: #8a5c11;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Trebuchet MS", "Gill Sans", sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 10% 10%, #fff3dc 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, #f7cf9f 0%, transparent 36%),
      linear-gradient(140deg, var(--bg) 0%, var(--bg-accent) 100%);
    min-height: 100vh;
  }

  .page {
    width: min(980px, 96vw);
    margin: 2rem auto;
    padding: 1rem;
  }

  .card {
    background: color-mix(in srgb, var(--card) 92%, white);
    border: 1px solid var(--line);
    border-radius: 1.1rem;
    padding: 1.5rem;
    box-shadow: 0 14px 30px rgba(31, 27, 24, 0.12);
    animation: rise 500ms ease-out;
  }

  h1 {
    margin: 0;
    font-size: clamp(1.6rem, 1.2rem + 1.2vw, 2.3rem);
    letter-spacing: 0.01em;
  }

  .subtitle {
    margin-top: 0.6rem;
    color: var(--muted);
  }

  .form-grid {
    margin-top: 1.25rem;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 1rem;
  }

  label {
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
    font-size: 0.95rem;
    font-weight: 700;
  }

  input,
  textarea,
  select {
    width: 100%;
    font: inherit;
    color: var(--ink);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 0.65rem;
    padding: 0.65rem 0.7rem;
    outline: none;
    transition: border-color 180ms ease, box-shadow 180ms ease;
  }

  input:focus,
  textarea:focus,
  select:focus {
    border-color: var(--action);
    box-shadow: 0 0 0 3px rgba(31, 122, 90, 0.18);
  }

  textarea {
    resize: vertical;
    min-height: 3.5rem;
  }

  .full {
    grid-column: 1 / -1;
  }

  button {
    grid-column: 1 / -1;
    margin-top: 0.3rem;
    border: 0;
    border-radius: 0.75rem;
    background: linear-gradient(120deg, #216d52, #1a8a63);
    color: var(--action-ink);
    font: inherit;
    font-weight: 800;
    letter-spacing: 0.01em;
    padding: 0.78rem 1rem;
    cursor: pointer;
    transition: transform 120ms ease, opacity 120ms ease;
  }

  button:hover {
    transform: translateY(-1px);
  }

  button:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
  }

  .status {
    margin-top: 1rem;
    border-radius: 0.7rem;
    border: 1px solid var(--line);
    padding: 0.7rem 0.9rem;
    min-height: 2.75rem;
    background: #fff;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .status.pending {
    border-color: color-mix(in srgb, var(--pending) 35%, white);
    color: var(--pending);
  }

  .status.success {
    border-color: color-mix(in srgb, var(--ok) 40%, white);
    color: var(--ok);
  }

  .status.error {
    border-color: color-mix(in srgb, var(--danger) 35%, white);
    color: var(--danger);
  }

  @keyframes rise {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 760px) {
    .page {
      margin: 0.8rem auto;
      padding: 0.4rem;
    }

    .card {
      padding: 1rem;
    }

    .form-grid {
      grid-template-columns: 1fr;
    }

    .full {
      grid-column: auto;
    }
  }
</style>
